<!DOCTYPE html>
<html>
<head>
<title>Payment Success</title>

<style>

body{
    font-family: Arial;
    background:#f4f6fb;
    text-align:center;
}

.box{
    width:420px;
    margin:120px auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    color:#2ecc71;
}

p{
    color:#555;
}

button{
    padding:12px 25px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#2980b9;
}

</style>

</head>

<body>

<div class="box">

<h2>Payment Successful ✅</h2>

<p>Your room booking has been confirmed.</p>

<br>

<a href="/">
<button>Back to Dashboard</button>
</a>

</div>

</body>
</html>
